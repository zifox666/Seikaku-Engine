name: Release

on:
  push:
    branches:
    - main
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # Windows x86_64  →  seikaku_engine.dll
  # ---------------------------------------------------------------------------
  build-windows:
    name: Windows x86_64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: x86_64-pc-windows-msvc

      - name: Build cdylib
        run: cargo build --release --lib --no-default-features --features rust,eft

      - name: Package artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifact
          Copy-Item target/release/seikaku_engine.dll artifact/
          if (Test-Path target/release/seikaku_engine.dll.lib) {
            Copy-Item target/release/seikaku_engine.dll.lib artifact/
          }
          if (Test-Path target/release/seikaku_engine.lib) {
            Copy-Item target/release/seikaku_engine.lib artifact/
          }

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: artifact/

  # ---------------------------------------------------------------------------
  # macOS  →  libseikaku_engine.dylib  (universal binary: x86_64 + arm64)
  # ---------------------------------------------------------------------------
  build-macos:
    name: macOS Universal
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Build x86_64
        run: cargo build --release --lib --target x86_64-apple-darwin --no-default-features --features rust,eft

      - name: Build aarch64
        run: cargo build --release --lib --target aarch64-apple-darwin --no-default-features --features rust,eft

      - name: Create universal binary
        run: |
          mkdir -p artifact
          lipo -create \
            target/x86_64-apple-darwin/release/libseikaku_engine.dylib \
            target/aarch64-apple-darwin/release/libseikaku_engine.dylib \
            -output artifact/libseikaku_engine.dylib

      - uses: actions/upload-artifact@v4
        with:
          name: macos-universal
          path: artifact/

  # ---------------------------------------------------------------------------
  # iOS  →  libseikaku_engine.a  (aarch64 static lib)
  # ---------------------------------------------------------------------------
  build-ios:
    name: iOS aarch64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: aarch64-apple-ios

      - name: Build static lib
        run: cargo build --release --lib --target aarch64-apple-ios --no-default-features --features rust,eft

      - name: Package artifacts
        run: |
          mkdir -p artifact
          # staticlib crate-type produces libseikaku_engine.a
          cp target/aarch64-apple-ios/release/libseikaku_engine.a artifact/
          # Also include the header stub if present
          if [ -f src/seikaku_engine.h ]; then
            cp src/seikaku_engine.h artifact/
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ios-aarch64
          path: artifact/

  # ---------------------------------------------------------------------------
  # Android  →  libseikaku_engine.so  (arm64-v8a, armeabi-v7a, x86_64)
  # ---------------------------------------------------------------------------
  build-android:
    name: Android
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: aarch64-linux-android
            abi: arm64-v8a
          - target: armv7-linux-androideabi
            abi: armeabi-v7a
          - target: x86_64-linux-android
            abi: x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Build with cargo-ndk
        run: |
          cargo ndk -t ${{ matrix.abi }} build --release --lib --no-default-features --features rust,eft

      - name: Package artifacts
        run: |
          mkdir -p artifact
          cp target/${{ matrix.target }}/release/libseikaku_engine.so artifact/

      - uses: actions/upload-artifact@v4
        with:
          name: android-${{ matrix.abi }}
          path: artifact/

  # ---------------------------------------------------------------------------
  # Create GitHub Release with all platform artifacts
  # ---------------------------------------------------------------------------
  release:
    name: Create Release
    needs: [build-windows, build-macos, build-ios, build-android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package platform archives
        run: |
          cd artifacts

          cd windows-x86_64
          zip -r ../../seikaku-engine-windows-x86_64.zip .
          cd ..

          cd macos-universal
          tar czf ../../seikaku-engine-macos-universal.tar.gz .
          cd ..

          cd ios-aarch64
          tar czf ../../seikaku-engine-ios-aarch64.tar.gz .
          cd ..

          for abi in arm64-v8a armeabi-v7a x86_64; do
            cd "android-${abi}"
            tar czf "../../seikaku-engine-android-${abi}.tar.gz" .
            cd ..
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            seikaku-engine-windows-x86_64.zip
            seikaku-engine-macos-universal.tar.gz
            seikaku-engine-ios-aarch64.tar.gz
            seikaku-engine-android-arm64-v8a.tar.gz
            seikaku-engine-android-armeabi-v7a.tar.gz
            seikaku-engine-android-x86_64.tar.gz
